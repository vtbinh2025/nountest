In spite of + Ving/N"}, {"id": 96, "q": "She is ______ listening to music.", "o": ["fond of", "keen on", "interested in", "all are correct"], "a": "all are correct", "p": "Fond of / Keen on / Interested in + Ving"}, {"id": 97, "q": "Hard work is ______ success.", "o": ["the key to", "the way to", "the point of", "the part of"], "a": "the key to", "p": "The key to + Ving/N"}, {"id": 98, "q": "I ______ getting up early in the morning.", "o": ["am used to", "used to", "get to", "be to"], "a": "am used to", "p": "Get/be used to + Ving (quen với)"}, {"id": 99, "q": "She ______ laughing when she saw the clown.", "o": ["couldn't help", "couldn't stop", "couldn't wait", "couldn't stand"], "a": "couldn't help", "p": "Couldn't help Ving (không thể không)"}, {"id": 100, "q": "She is good ______ playing the piano.", "o": ["at", "in", "on", "with"], "a": "at", "p": "Sau giới từ + Ving"}, {"id": 101, "q": "It ______ me two hours ______ my homework.", "o": ["takes...to do", "spends...doing", "takes...doing", "spends...to do"], "a": "takes...to do", "p": "Take + time + to V"}, {"id": 102, "q": "I ______ to have a cup of coffee.", "o": ["would like", "like", "enjoy", "adore"], "a": "would like", "p": "Would like/love/prefer + to V"}, {"id": 103, "q": "My teacher ______ me ______ harder.", "o": ["encouraged...to study", "suggested...studying", "wanted...studying", "planned...to study"], "a": "encouraged...to study", "p": "Encourage somebody to V"}, {"id": 104, "q": "I ______ to go abroad next year.", "o": ["want", "suggest", "adore", "enjoy"], "a": "want", "p": "Want + to V"}, {"id": 105, "q": "I ______ to stay at home tonight.", "o": ["prefer", "suggest", "adore", "mind"], "a": "prefer", "p": "Prefer + to V"}, {"id": 106, "q": "We ______ to visit Hue next month.", "o": ["plan", "suggest", "mind", "deny"], "a": "plan", "p": "Plan + to V"}, {"id": 107, "q": "He ______ to be very happy today.", "o": ["seems", "suggests", "wants", "plans"], "a": "seems", "p": "Seem + to V"}, {"id": 108, "q": "I ______ to see the movie.", "o": ["can't wait", "can't help", "can't stop", "can't mind"], "a": "can't wait", "p": "Can't wait + to V"}, {"id": 109, "q": "You ______ brush your teeth twice a day.", "o": ["should", "may", "might", "can"], "a": "should", "p": "Model Verbs + V"}, {"id": 110, "q": "I ______ live in the countryside when I was a child.", "o": ["used to", "am used to", "get used to", "was used to"], "a": "used to", "p": "Used to + V (đã từng)"}, {"id": 111, "q": "______ we go to the cinema tonight?", "o": ["Why don't", "How about", "What about", "Let's"], "a": "Why don't", "p": "Why don't we + V"}, {"id": 112, "q": "______ go to the beach!", "o": ["Let's", "Why don't", "How about", "What about"], "a": "Let's", "p": "Let's + V"}, {"id": 113, "q": "You ______ obey the traffic rules.", "o": ["must", "can", "may", "might"], "a": "must", "p": "Must + V"}, {"id": 114, "q": "He ______ speak three languages.", "o": ["can", "must", "should", "ought to"], "a": "can", "p": "Can + V"}, {"id": 115, "q": "It ______ rain tomorrow.", "o": ["might", "should", "must", "ought to"], "a": "might", "p": "Might + V"}];

    // Quản lý trạng thái học tập
    let userStats = JSON.parse(localStorage.getItem('eng9_stats')) || {
        correct: 0,
        total: 0,
        weights: {} 
    };

    // Khởi tạo trọng số
    allData.forEach(q => {
        if (userStats.weights[q.id] === undefined) userStats.weights[q.id] = 10;
    });

    let currentBatch = [];
    let batchAnswers = {};

    function saveStats() {
        localStorage.setItem('eng9_stats', JSON.stringify(userStats));
        updateStatsUI();
    }

    function updateStatsUI() {
        document.getElementById('correctCount').innerText = userStats.correct;
        document.getElementById('totalDone').innerText = userStats.total;
        const acc = userStats.total === 0 ? 0 : Math.round((userStats.correct / userStats.total) * 100);
        document.getElementById('accuracy').innerText = acc + '%';
        
        const mastered = Object.values(userStats.weights).filter(w => w < 5).length;
        document.getElementById('progressFill').style.width = (mastered / 115 * 100) + '%';
    }

    function loadBatch() {
        const quizArea = document.getElementById('quizArea');
        quizArea.innerHTML = '';
        batchAnswers = {};
        
        const sortedIds = Object.keys(userStats.weights).sort((a, b) => userStats.weights[b] - userStats.weights[a]);
        const pool = sortedIds.slice(0, 30);
        const selectedIds = [];
        const poolCopy = [...pool];
        
        while(selectedIds.length < 5 && poolCopy.length > 0) {
            const idx = Math.floor(Math.random() * poolCopy.length);
            selectedIds.push(parseInt(poolCopy.splice(idx, 1)[0]));
        }

        currentBatch = allData.filter(q => selectedIds.includes(q.id));

        currentBatch.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.id = `card-${q.id}`;
            card.innerHTML = `
                <div class="question-text">${idx + 1}. ${q.q}</div>
                <div class="options-grid" id="options-${q.id}">
                    ${q.o.map(opt => `<button class="option-btn" onclick="selectOption(${q.id}, '${opt}', this)">${opt}</button>`).join('')}
                </div>
                <div class="phrase-hint" id="hint-${q.id}">Cấu trúc: ${q.p}</div>
            `;
            quizArea.appendChild(card);
        });
        window.scrollTo(0,0);
    }

    function selectOption(id, val, btn) {
        const parent = document.getElementById(`options-${id}`);
        const btns = parent.querySelectorAll('.option-btn');
        btns.forEach(b => b.style.borderColor = '#eee');
        btn.style.borderColor = 'var(--secondary)';
        batchAnswers[id] = val;
    }

    function checkAll() {
        let correctInBatch = 0;
        let answeredCount = 0;

        currentBatch.forEach(q => {
            const userAns = batchAnswers[q.id];
            if (!userAns) return;

            answeredCount++;
            const parent = document.getElementById(`options-${q.id}`);
            const btns = parent.querySelectorAll('.option-btn');
            const hint = document.getElementById(`hint-${q.id}`);
            
            hint.style.display = 'block';
            btns.forEach(b => {
                b.disabled = true;
                if (b.innerText === q.a) b.classList.add('correct');
                if (b.innerText === userAns && userAns !== q.a) b.classList.add('wrong');
            });

            if (userAns === q.a) {
                correctInBatch++;
                userStats.weights[q.id] = Math.max(1, userStats.weights[q.id] - 3);
            } else {
                userStats.weights[q.id] += 5;
            }
        });

        if (answeredCount > 0) {
            userStats.correct += correctInBatch;
            userStats.total += answeredCount;
            saveStats();
        } else {
            alert('Vui lòng chọn đáp án trước khi chấm điểm!');
        }
    }

    updateStatsUI();
    loadBatch();
</script>
