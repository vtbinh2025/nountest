        let stats = JSON.parse(localStorage.getItem('noun_fill_stats')) || {};
        bank.forEach(q => { if(!stats[q.id]) stats[q.id] = { seen: 0, best: 0 } });

        let currentQ = [];

        function generateTest() {
            const area = document.getElementById('quiz-area');
            area.innerHTML = '';
            
            // Ưu tiên câu điểm thấp
            let sorted = bank.map(q => ({ q, score: stats[q.id].best }))
                             .sort((a,b) => a.score - b.score);
            
            currentQ = sorted.slice(0, 15).sort(() => Math.random() - 0.5).slice(0, 5).map(x => x.q);

            currentQ.forEach((q, i) => {
                area.insertAdjacentHTML('beforeend', `
                    <div class="quiz-item bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-between">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-bold text-indigo-400">CÂU ${i+1}</span>
                            <span id="pill-${i}" class="px-2 py-0.5 rounded bg-slate-100 text-slate-400 text-[9px] font-bold uppercase">Chờ</span>
                        </div>
                        <p class="text-[12px] font-bold text-slate-700 leading-tight">${q.q}</p>
                        <p class="text-[10px] text-indigo-500 font-medium italic mb-2">${q.p}</p>
                        <input type="text" id="input-${i}" spellcheck="false" autocomplete="off"
                            class="w-full p-2 rounded-lg border border-slate-200 outline-none text-[12px] font-bold focus:border-indigo-500 transition-all" 
                            placeholder="Điền từ đúng vào đây...">
                        <div id="exp-${i}" class="explanation"></div>
                    </div>
                `);
            });
            updateHeader();
        }

        function checkAnswers() {
            let correctCount = 0;
            currentQ.forEach((q, i) => {
                const input = document.getElementById(`input-${i}`);
                const userVal = input.value.trim().toLowerCase();
                const targetVal = q.a.toLowerCase();
                
                let isCorrect = (userVal === targetVal);
                if(isCorrect) correctCount++;

                stats[q.id].seen++;
                let score = isCorrect ? 1 : 0;
                if(score > stats[q.id].best) stats[q.id].best = score;

                const pill = document.getElementById(`pill-${i}`);
                pill.innerText = isCorrect ? "ĐÚNG" : "SAI";
                pill.className = `px-2 py-0.5 rounded text-[9px] font-bold ${isCorrect ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`;
                
                input.classList.add(isCorrect ? 'border-emerald-500' : 'border-rose-400');

                const exp = document.getElementById(`exp-${i}`);
                exp.innerHTML = `
                    <div class="font-bold text-indigo-700 mb-1 text-[11px]">Đáp án: ${q.a}</div>
                    <div class="italic text-slate-500 text-[10px]">${q.e}</div>
                `;
                exp.style.display = 'block';
                input.disabled = true;
            });
            localStorage.setItem('noun_fill_stats', JSON.stringify(stats));
            document.getElementById('session-info').innerText = `Lượt này đúng: ${correctCount}/5`;
            updateHeader();
        }

        function updateHeader() {
            const mastered = Object.values(stats).filter(s => s.best === 1).length;
            document.getElementById('mastered-count').innerText = mastered;
            const totalSeen = Object.values(stats).filter(s => s.seen > 0).length;
            const avg = totalSeen > 0 ? (mastered / totalSeen) * 100 : 0;
            document.getElementById('avg-score').innerText = Math.round(avg);
        }

        generateTest();
    </script>
</body>
</html>
