        .controls { display: flex; gap: 10px; margin-top: 20px; }
        button.main { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; }
        .btn-grade { background: #1a73e8; color: white; }

        let weights = JSON.parse(localStorage.getItem('verb_weights')) || {};
        let totalCorrect = parseInt(localStorage.getItem('total_correct')) || 0;
        let totalAttempts = parseInt(localStorage.getItem('total_attempts')) || 0;
        
        allQuestions.forEach(q => { if(!weights[q.id]) weights[q.id] = 5; });

        let currentBatch = [];
        let selections = {};

        function save() {
            localStorage.setItem('verb_weights', JSON.stringify(weights));
            localStorage.setItem('total_correct', totalCorrect);
            localStorage.setItem('total_attempts', totalAttempts);
            updateStats();
        }

        function updateStats() {
            const pct = totalAttempts === 0 ? 0 : Math.round((totalCorrect / totalAttempts) * 100);
            document.getElementById('score-pct').innerText = pct;
            const mastered = Object.values(weights).filter(w => w <= 1).length;
            document.getElementById('mastered').innerText = mastered;
        }

        function loadNewBatch() {
            const box = document.getElementById('quiz-box');
            box.innerHTML = '';
            selections = {};
            
            // Lấy 5 câu có trọng số cao nhất (ưu tiên câu chưa làm hoặc làm sai)
            let sorted = allQuestions.slice().sort((a, b) => weights[b.id] - weights[a.id]);
            currentBatch = sorted.slice(0, 15).sort(() => Math.random() - 0.5).slice(0, 5);

            currentBatch.forEach((q, i) => {
                const div = document.createElement('div');
                div.className = 'question';
                div.innerHTML = `
                    <div class="q-text">${i+1}. ${q.q} <span class="type-tag">[${q.type}]</span></div>
                    <div class="options" id="opt-group-${q.id}">
                        ${q.o.map(opt => `<button class="btn-opt" onclick="select(${q.id}, '${opt}', this)">${opt}</button>`).join('')}
                    </div>
                `;
                box.appendChild(div);
            });
        }

        function select(id, val, el) {
            selections[id] = val;
            const parent = document.getElementById('opt-group-'+id);
            parent.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }

        function grade() {
            let answered = Object.keys(selections).length;
            if(answered < 5) { alert('Vui lòng làm hết 5 câu!'); return; }

            currentBatch.forEach(q => {
                const userVal = selections[q.id];
                const parent = document.getElementById('opt-group-'+q.id);
                const buttons = parent.querySelectorAll('.btn-opt');
                
                totalAttempts++;
                if(userVal === q.a) {
                    totalCorrect++;
                    weights[q.id] = Math.max(1, weights[q.id] - 1);
                    buttons.forEach(b => { if(b.innerText === q.a) b.classList.add('correct'); });
                } else {
                    weights[q.id] += 2;
                    buttons.forEach(b => {
                        if(b.innerText === q.a) b.classList.add('correct');
                        if(b.innerText === userVal) b.classList.add('wrong');
                    });
                }
            });
            save();
        }

        loadNewBatch();
        updateStats();
    </script>
