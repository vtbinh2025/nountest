<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trắc Nghiệm Word Form - Thứ Tự Mới</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 30px; }
        .word-block { border: 1px solid #e0e0e0; padding: 20px; margin-bottom: 20px; border-radius: 8px; background: #fafafa; }
        .word-title { font-weight: bold; color: #d9534f; font-size: 1.3em; margin-bottom: 15px; border-left: 5px solid #d9534f; padding-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        .label { font-size: 0.85em; font-weight: 600; color: #5f6368; margin-bottom: 5px; text-transform: uppercase; }
        input { padding: 10px; border: 2px solid #ddd; border-radius: 6px; font-size: 15px; transition: border-color 0.3s; }
        input:focus { border-color: #1a73e8; outline: none; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #1557b0; }
        .result { margin-top: 25px; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 1.1em; }
        .correct { border-color: #28a745 !important; background: #e6f4ea; }
        .wrong { border-color: #dc3545 !important; background: #fce8e6; }
        .note { font-size: 0.9em; color: #666; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Word Form Mastery</h1>
    <div id="quiz-container">
        <p style="text-align: center; color: #666;">Nhấn nút bên dưới để bắt đầu luyện tập 5 từ ngẫu nhiên từ ngân hàng câu hỏi PDF.</p>
    </div>
    <div style="text-align: center; margin-top: 20px;">
        <button id="action-btn" onclick="startQuiz()">BẮT ĐẦU BÀI MỚI</button>
    </div>
    <div id="score" class="result"></div>
</div>

<script>
// Toàn bộ dữ liệu trích xuất từ Test 1 - Test 8 trong PDF 
const wordBank = [
   // TEST 1
    { root: "color", adj: "colorful", noun: "color", verb: "color", adv: "" },
    { root: "impress", adj: "impressive", noun: "impression", verb: "impress", adv: "impressively" },
    { root: "surprise", adj: "surprising", noun: "surprise", verb: "surprise", adv: "surprisingly" },
    { root: "heat", adj: "heated", noun: "heat/heater", verb: "heat", adv: "heatedly" },
    { root: "permit", adj: "", noun: "permission", verb: "permit", adv: "" },
    { root: "document", adj: "documentary", noun: "document", verb: "document", adv: "" },

    // TEST 2
    { root: "use", adj: "useful", noun: "use", verb: "use", adv: "usefully" },
    { root: "promise", adj: "promising", noun: "promise", verb: "promise", adv: "" },
    { root: "increase", adj: "increasing", noun: "increase", verb: "increase", adv: "increasingly" },
    { root: "sun", adj: "solar", noun: "sun", verb: "", adv: "" },
    { root: "perform", adj: "", noun: "performance/performer", verb: "perform", adv: "" },
    { root: "develop", adj: "developed", noun: "development/developer", verb: "develop", adv: "" },

    // TEST 3
    { root: "occasion", adj: "occasional", noun: "occasion", verb: "occasion", adv: "occasionally" },
    { root: "nominate", adj: "nominated", noun: "nominee/nominator/nomination", verb: "nominate", adv: "" },
    { root: "attend", adj: "attentive", noun: "attention", verb: "attend", adv: "attentively" },
    { root: "conserve", adj: "conservative", noun: "conservation", verb: "conserve", adv: "conservatively" },
    { root: "decorate", adj: "decorative", noun: "decoration", verb: "decorate", adv: "decoratively" },

    // TEST 4
    { root: "depend", adj: "dependent/independent", noun: "dependence/independence", verb: "depend", adv: "dependently/independently" },
    { root: "relax", adj: "relaxing", noun: "relaxation", verb: "relax", adv: "" },
    { root: "consume", adj: "consumable", noun: "consumption", verb: "consume", adv: "" },
    { root: "extend", adj: "extensive", noun: "extension", verb: "extend", adv: "extensively" },
    { root: "instruct", adj: "instructive", noun: "instructor", verb: "instruct", adv: "instructively" },
    { root: "erupt", adj: "eruptive", noun: "eruption", verb: "erupt", adv: "" },

    // TEST 5
    { root: "elegant", adj: "elegant", noun: "elegance", verb: "", adv: "elegantly" },
    { root: "preserve", adj: "preservative", noun: "preservation", verb: "preserve", adv: "" },
    { root: "pollute", adj: "polluted", noun: "pollution", verb: "pollute", adv: "" },
    { root: "admire", adj: "admirable", noun: "admiration", verb: "admire", adv: "admirably" },
    { root: "fortune", adj: "fortunate", noun: "fortune", verb: "", adv: "fortunately" },

    // TEST 6
    { root: "benefit", adj: "beneficial", noun: "benefit", verb: "benefit", adv: "beneficially" },
    { root: "contest", adj: "contested", noun: "contestant", verb: "contest", adv: "" },
    { root: "home", adj: "home/homeless", noun: "home/homelessness", verb: "home", adv: "" },
    { root: "near", adj: "near", noun: "nearness", verb: "near", adv: "nearly" },
    { root: "conclude", adj: "conclusive", noun: "conclusion", verb: "conclude", adv: "conclusively" },

    // TEST 7
    { root: "prepare", adj: "prepared", noun: "preparation", verb: "prepare", adv: "" },
    { root: "experience", adj: "experienced", noun: "experience", verb: "experience", adv: "" },
    { root: "beauty", adj: "beautiful", noun: "beauty", verb: "beautify", adv: "beautifully" },
    { root: "effect", adj: "effective", noun: "effect", verb: "affect", adv: "effectively" },
    { root: "assist", adj: "assistant", noun: "assistance", verb: "assist", adv: "" },
    { root: "succeed", adj: "successful", noun: "success", verb: "succeed", adv: "successfully" },

    // TEST 8
    { root: "attract", adj: "attractive", noun: "attraction", verb: "attract", adv: "attractively" },
    { root: "please", adj: "pleasant", noun: "pleasure", verb: "please", adv: "pleasantly" },
    { root: "amaze", adj: "amazing", noun: "amazement", verb: "amaze", adv: "amazingly" },
    { root: "science", adj: "scientific", noun: "science/scientist", verb: "", adv: "scientifically" },
    { root: "damage", adj: "damaging", noun: "damage", verb: "damage", adv: "" }
];

let masteredWords = JSON.parse(localStorage.getItem('masteredWords')) || [];
let currentQuizWords = [];

function startQuiz() {
    let availableWords = wordBank.filter(w => !masteredWords.includes(w.root));
    
    if (availableWords.length < 5) {
        masteredWords = [];
        availableWords = [...wordBank];
        alert("Bạn đã hoàn thành tất cả từ vựng! Hệ thống sẽ bắt đầu lại từ đầu.");
    }

    currentQuizWords = availableWords.sort(() => 0.5 - Math.random()).slice(0, 5);
    
    renderQuiz();
    document.getElementById('action-btn').innerText = "NỘP BÀI";
    document.getElementById('action-btn').onclick = checkAnswers;
    document.getElementById('score').innerHTML = "";
}

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = "";
    
    currentQuizWords.forEach((w, index) => {
        const div = document.createElement('div');
        div.className = 'word-block';
        div.innerHTML = `
            <div class="word-title">Gốc: ${w.root.toUpperCase()}</div>
            <div class="grid">
                <div class="input-group">
                    <div class="label">Danh từ (Noun)</div>
                    <input type="text" id="noun-${index}" autocomplete="off">
                </div>
                <div class="input-group">
                    <div class="label">Động từ (Verb)</div>
                    <input type="text" id="verb-${index}" autocomplete="off">
                </div>
                <div class="input-group">
                    <div class="label">Tính từ (Adj)</div>
                    <input type="text" id="adj-${index}" autocomplete="off">
                </div>
                <div class="input-group">
                    <div class="label">Trạng từ (Adv)</div>
                    <input type="text" id="adv-${index}" autocomplete="off">
                </div>
            </div>
            <div id="ans-note-${index}" class="note"></div>
        `;
        container.appendChild(div);
    });
}

function checkAnswers() {
    let totalCorrectCells = 0;
    let perfectWords = 0;

    currentQuizWords.forEach((w, index) => {
        const types = ['noun', 'verb', 'adj', 'adv'];
        let isWordPerfect = true;

        types.forEach(type => {
            const input = document.getElementById(`${type}-${index}`);
            const userVal = input.value.trim().toLowerCase();
            const correctVal = w[type].toLowerCase();

            // Logic kiểm tra: Đúng nếu khớp hoàn toàn hoặc khớp 1 phần trong các từ cách nhau bởi dấu /
            let isCorrect = false;
            if (correctVal === "") {
                if (userVal === "") isCorrect = true;
            } else {
                const possibleAnswers = correctVal.split('/').map(v => v.trim());
                if (possibleAnswers.includes(userVal)) isCorrect = true;
            }

            if (isCorrect) {
                input.className = 'correct';
                totalCorrectCells++;
            } else {
                input.className = 'wrong';
                input.title = `Đáp án đúng: ${w[type] || '(Không có)'}`;
                isWordPerfect = false;
            }
        });

        if (isWordPerfect) {
            if (!masteredWords.includes(w.root)) masteredWords.push(w.root);
            perfectWords++;
        } else {
            document.getElementById(`ans-note-${index}`).innerHTML = 
                `Đáp án: N: ${w.noun} | V: ${w.verb} | Adj: ${w.adj} | Adv: ${w.adv}`;
        }
    });

    localStorage.setItem('masteredWords', JSON.stringify(masteredWords));
    
    document.getElementById('score').innerHTML = `Đúng ${totalCorrectCells}/20 ô. <br> 
    Thêm được <b>${perfectWords}</b> từ vào danh sách đã thuộc (sẽ không xuất hiện lại lượt tới).`;
    
    document.getElementById('action-btn').innerText = "LÀM TIẾP 5 TỪ KHÁC";
    document.getElementById('action-btn').onclick = startQuiz;
}
</script>
</body>
</html>
