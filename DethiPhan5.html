<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện tập Word Form - Tiếng Anh 10</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f0f2f5;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); border-bottom: 3px solid var(--accent); padding-bottom: 10px; }
        .stats { display: flex; justify-content: space-around; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; }
        
        .question-box { border: 1px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 15px; background: #fff; position: relative; }
        .q-text { font-size: 1.1em; margin-bottom: 12px; line-height: 1.6; }
        .word-bracket { color: var(--danger); font-weight: bold; }
        
        input[type="text"] {
            width: 200px;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        input.correct-input { border-color: var(--success); background: #e8f5e9; }
        input.wrong-input { border-color: var(--danger); background: #ffebee; }

        .feedback { margin-top: 10px; font-weight: bold; display: none; }
        .correct-txt { color: var(--success); }
        .wrong-txt { color: var(--danger); }

        .controls { display: flex; gap: 15px; margin-top: 25px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; transition: 0.3s; }
        #grade-btn { background: var(--primary); color: white; }
        #next-btn { background: var(--accent); color: white; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <h1>WORD FORM PRACTICE (SECTION V)</h1>
    <div class="stats">
        <span>Đã thuộc: <span id="mastered-count" style="color: var(--success)">0</span>/60</span>
        <span>Điểm lần này: <span id="current-score">0/5</span></span>
    </div>

    <div id="quiz-area"></div>

    <div class="controls">
        <button id="grade-btn" onclick="gradeBatch()">CHẤM ĐIỂM</button>
        <button id="next-btn" onclick="initBatch()">5 CÂU TIẾP THEO (KHÓ)</button>
    </div>
</div>

<script>
// DỮ LIỆU 60 CÂU WORD FORM TỪ FILE PDF
const wordFormBank = [
    {id:1, q:"The Ao dai is the ______ dress of Vietnamese women.", w:"TRADITION", a:"traditional"},
    {id:2, q:"The internet has ______ developed in Vietnam.", o:"INCREDIBLE", a:"incredibly"},
    {id:3, q:"We must learn about keeping the environment ______.", w:"POLLUTE", a:"unpolluted"},
    {id:4, q:"The ______ of the experiment made us happy.", w:"SUCCEED", a:"success"},
    {id:5, q:"Solar energy is a ______ source of power.", w:"RENEW", a:"renewable"},
    {id:6, q:"The air in the city is ______ polluted.", w:"HEAVY", a:"heavily"},
    {id:7, q:"He is a ______ person. He always helps others.", w:"HELP", a:"helpful"},
    {id:8, q:"She sang the song ______.", w:"BEAUTIFUL", a:"beautifully"},
    {id:9, q:"The ______ of the mountain is very impressive.", w:"HIGH", a:"height"},
    {id:10, q:"There are many ______ celebrations throughout the year.", w:"FESTIVAL", a:"festive"},
    {id:11, q:"Energy ______ is very important nowadays.", w:"CONSERVE", a:"conservation"},
    {id:12, q:"The teacher gave us a lot of ______.", w:"ENCOURAGE", a:"encouragement"},
    {id:13, q:"We should avoid ______ the water.", w:"POLLUTE", a:"polluting"},
    {id:14, q:"The local people are very ______.", w:"FRIEND", a:"friendly"},
    {id:15, q:"Plastic bags are ______ to the environment.", w:"HARM", a:"harmful"},
    {id:16, q:"Her ______ made me surprised.", w:"APPEAR", a:"appearance"},
    {id:17, q:"He was ______ in his attempt to win the race.", w:"SUCCEED", a:"successful"},
    {id:18, q:"They have ______ their house recently.", w:"MODERN", a:"modernized"},
    {id:19, q:"The movie was very ______.", w:"INTEREST", a:"interesting"},
    {id:20, q:"She is an ______ student.", w:"EXCEL", a:"excellent"},
    {id:21, q:"We need to ______ our natural resources.", w:"PROTECTION", a:"protect"},
    {id:22, q:"The ______ between the two countries is good.", w:"RELATION", a:"relationship"},
    {id:23, q:"She is ______ in learning English.", w:"INTEREST", a:"interested"},
    {id:24, q:"The weather was ______ cold yesterday.", w:"EXTREME", a:"extremely"},
    {id:25, q:"He is a famous ______.", w:"SCIENCE", a:"scientist"},
    {id:26, q:"The ______ of the bridge took two years.", w:"CONSTRUCT", a:"construction"},
    {id:27, q:"I am very ______ of my father.", w:"PRIDE", a:"proud"},
    {id:28, q:"We should reduce ______.", w:"CONSUME", a:"consumption"},
    {id:29, q:"He drove ______ and had an accident.", w:"CARE", a:"carelessly"},
    {id:30, q:"The ______ of the town is growing.", w:"POPULATE", a:"population"},
    {id:31, q:"The volcano ______ unexpectedly.", w:"ERUPT", a:"erupted"},
    {id:32, q:"Music is a form of ______.", w:"ENTERTAIN", a:"entertainment"},
    {id:33, q:"He is ______ about his future.", w:"HOPE", a:"hopeful"},
    {id:34, q:"The food was ______ prepared.", w:"DELICIOUS", a:"deliciously"},
    {id:35, q:"There is a ______ of water in this area.", w:"SHORT", a:"shortage"},
    {id:36, q:"They are ______ working on the project.", w:"BUSY", a:"busily"},
    {id:37, q:"Her ______ made him very sad.", w:"DIE", a:"death"},
    {id:38, q:"She is a very ______ dancer.", w:"GRACE", a:"graceful"},
    {id:39, q:"The ______ was a great success.", w:"PERFORM", a:"performance"},
    {id:40, q:"We should ______ the usage of plastic.", w:"MINIMIZE", a:"minimize"},
    {id:41, q:"The ______ is very fresh in the morning.", w:"ATMOSPHERE", a:"atmosphere"},
    {id:42, q:"He gave a ______ explanation.", w:"SATISFY", a:"satisfactory"},
    {id:43, q:"The ______ of the child is normal.", w:"DEVELOP", a:"development"},
    {id:44, q:"You should be ______ when crossing the street.", w:"CARE", a:"careful"},
    {id:45, q:"The ______ was very informative.", w:"ADVERTISE", a:"advertisement"},
    {id:46, q:"He is ______ to his parents.", w:"OBEY", a:"obedient"},
    {id:47, q:"The situation is ______.", w:"HOPE", a:"hopeless"},
    {id:48, q:"The ______ was signed yesterday.", w:"AGREE", a:"agreement"},
    {id:49, q:"I ______ agree with you.", w:"ENTIRE", a:"entirely"},
    {id:50, q:"We need more ______ about the course.", w:"INFORM", a:"information"},
    {id:51, q:"She has a large ______ of stamps.", w:"COLLECT", a:"collection"},
    {id:52, q:"It is ______ to drive without a license.", w:"LEGAL", a:"illegal"},
    {id:53, q:"The ______ of the forest is essential.", w:"PRESERVE", a:"preservation"},
    {id:54, q:"He is a ______ person.", w:"RELY", a:"reliable"},
    {id:55, q:"The ______ was very exciting.", w:"COMPETE", a:"competition"},
    {id:56, q:"I am ______ sorry for the delay.", w:"EXTREME", a:"extremely"},
    {id:57, q:"The children are very ______.", w:"CREATE", a:"creative"},
    {id:58, q:"We must ______ the environment.", w:"ENRICH", a:"enrich"},
    {id:59, q:"The ______ was very beautiful.", w:"SCENE", a:"scenery"},
    {id:60, q:"He is very ______ in his work.", w:"ACTIVE", a:"active"}
];

let weights = JSON.parse(localStorage.getItem('wf_weights')) || {};
wordFormBank.forEach(q => { if(weights[q.id] === undefined) weights[q.id] = 100; });

let currentBatch = [];

function initBatch() {
    const sorted = [...wordFormBank].sort((a, b) => weights[b.id] - weights[a.id]);
    currentBatch = sorted.slice(0, 5);
    
    const area = document.getElementById('quiz-area');
    area.innerHTML = '';
    
    currentBatch.forEach((q, idx) => {
        const div = document.createElement('div');
        div.className = 'question-box';
        div.innerHTML = `
            <div class="q-text">${idx+1}. ${q.q.replace('______', `<input type="text" id="input-${q.id}" placeholder="Điền đáp án...">`)} 
            (<span class="word-bracket">${q.w || q.o}</span>)</div>
            <div class="feedback" id="fb-${q.id}"></div>
        `;
        area.appendChild(div);
    });
    document.getElementById('current-score').innerText = "0/5";
    updateMasteryUI();
}

function gradeBatch() {
    let score = 0;
    currentBatch.forEach(q => {
        const input = document.getElementById(`input-${q.id}`);
        const fb = document.getElementById(`fb-${q.id}`);
        const userVal = input.value.trim().toLowerCase();
        const correctVal = q.a.toLowerCase();
        
        fb.style.display = 'block';
        input.disabled = true;

        if(userVal === correctVal) {
            score++;
            input.classList.add('correct-input');
            fb.innerHTML = `<span class="correct-txt">Chính xác!</span>`;
            weights[q.id] = Math.max(0, weights[q.id] - 40);
        } else {
            input.classList.add('wrong-input');
            fb.innerHTML = `<span class="wrong-txt">Sai rồi! Đáp án đúng: ${q.a}</span>`;
            weights[q.id] = Math.min(100, weights[q.id] + 20);
        }
    });
    
    document.getElementById('current-score').innerText = `${score}/5`;
    localStorage.setItem('wf_weights', JSON.stringify(weights));
    updateMasteryUI();
}

function updateMasteryUI() {
    const mastered = Object.values(weights).filter(w => w < 20).length;
    document.getElementById('mastered-count').innerText = mastered;
}

initBatch();
</script>
</body>
</html>
