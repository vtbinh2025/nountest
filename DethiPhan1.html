    <style>
        :root {
            --p: #2c3e50; --s: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f0f2f5;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); padding: 10px; color: #333; }
        .container { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--p); margin-bottom: 5px; font-size: 1.8em; }
        
        /* Dashboard */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #e1e4e8; }
        .stat-item { text-align: center; }
        .stat-num { display: block; font-size: 1.4em; font-weight: bold; color: var(--s); }
        .stat-label { font-size: 0.85em; color: #666; text-transform: uppercase; }

        /* Quiz UI */
        .q-card { border: 1px solid #e1e4e8; padding: 20px; margin-bottom: 15px; border-radius: 12px; background: #fff; transition: transform 0.2s; }
        .q-card:hover { border-color: var(--s); }
        .q-text { font-size: 1.1em; font-weight: 600; margin-bottom: 15px; line-height: 1.5; color: var(--p); }
        u { text-decoration: underline; color: var(--danger); font-weight: bold; }
        
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-opt { padding: 12px 15px; border: 1px solid #dcdfe6; background: #fff; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 1em; text-align: left; }
        .btn-opt:hover:not(:disabled) { background: #f0f7ff; border-color: var(--s); }
        .btn-opt.selected { border-color: var(--s); background: #e1effe; border-width: 2px; }
        .btn-opt.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .btn-opt.wrong { background: var(--danger) !important; color: white; border-color: var(--danger); }
        
        .hint { margin-top: 15px; padding: 12px; background: #fff9db; border-left: 4px solid #fab005; display: none; font-size: 0.95em; border-radius: 4px; }

        /* Controls */
        .controls { display: flex; gap: 10px; margin-top: 30px; position: sticky; bottom: 10px; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .main-btn { flex: 1; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 1em; transition: 0.3s; }
        .btn-grade { background: var(--p); }
        .btn-next { background: var(--s); }
        .btn-reset { background: #95a5a6; flex: 0.4; }
        
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>

    // Khởi tạo trạng thái
    let stats = JSON.parse(localStorage.getItem('eng10_pro_stats')) || {
        history: {}, 
        total_correct: 0,
        total_answered: 0
    };

    let currentBatch = [];
    let userAnswers = {};

    function saveStats() {
        localStorage.setItem('eng10_pro_stats', JSON.stringify(stats));
        updateDashboard();
    }

    function updateDashboard() {
        document.getElementById('total-done').innerText = stats.total_answered;
        const acc = stats.total_answered === 0 ? 0 : Math.round((stats.total_correct / stats.total_answered) * 100);
        document.getElementById('accuracy').innerText = acc + '%';
        
        let mastered = Object.keys(stats.history).filter(id => {
            const h = stats.history[id];
            return h.correct_streak >= 2; // Được coi là thuộc nếu làm đúng 2 lần liên tiếp
        }).length;
        document.getElementById('mastered-count').innerText = mastered + '/' + questionsData.length;
    }

    function generateBatch() {
        const quizArea = document.getElementById('quiz-area');
        quizArea.innerHTML = '';
        userAnswers = {};

        // Thuật toán chọn câu hỏi:
        // 1. Điểm ưu tiên cao cho câu chưa làm.
        // 2. Điểm ưu tiên trung bình cho câu làm sai nhiều.
        let pool = questionsData.map(q => {
            let h = stats.history[q.id] || {wrong_count: 0, show_count: 0, correct_streak: 0};
            let priority = 0;
            if (h.show_count === 0) priority += 100;
            priority += (h.wrong_count * 20);
            if (h.correct_streak > 0) priority -= (h.correct_streak * 30);
            return {data: q, priority: priority};
        });

        pool.sort((a, b) => b.priority - a.priority + (Math.random() * 40 - 20));
        currentBatch = pool.slice(0, 5).map(i => i.data);

        currentBatch.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `
                <div class="q-text">Câu ${idx + 1}: ${q.q}</div>
                <div class="options" id="group-${q.id}">
                    ${q.o.map(opt => `<button class="btn-opt" onclick="select(${q.id}, '${opt}', this)">${opt}</button>`).join('')}
                </div>
                <div class="hint" id="hint-${q.id}">💡 <b>Giải thích:</b> ${q.h}</div>
            `;
            quizArea.appendChild(card);
        });
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function select(qId, val, btn) {
        const group = document.getElementById(`group-${qId}`);
        group.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        userAnswers[qId] = val;
    }

    function gradeBatch() {
        if (Object.keys(userAnswers).length < currentBatch.length) {
            alert("Hãy chọn đáp án cho tất cả 5 câu!");
            return;
        }

        currentBatch.forEach(q => {
            if (!stats.history[q.id]) stats.history[q.id] = {wrong_count: 0, show_count: 0, correct_streak: 0};
            let h = stats.history[q.id];
            h.show_count++;

            const group = document.getElementById(`group-${q.id}`);
            const buttons = group.querySelectorAll('.btn-opt');
            const userChoice = userAnswers[q.id];

            document.getElementById(`hint-${q.id}`).style.display = 'block';

            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === q.a) btn.classList.add('correct');
                if (btn.innerText === userChoice && userChoice !== q.a) btn.classList.add('wrong');
            });

            if (userChoice === q.a) {
                stats.total_correct++;
                h.correct_streak++;
            } else {
                h.wrong_count++;
                h.correct_streak = 0;
            }
            stats.total_answered++;
        });

        saveStats();
    }

    function resetData() {
        if(confirm("Xóa toàn bộ tiến độ học tập?")) {
            localStorage.removeItem('eng10_pro_stats');
            location.reload();
        }
    }

    // Khởi chạy
    updateDashboard();
    generateBatch();
